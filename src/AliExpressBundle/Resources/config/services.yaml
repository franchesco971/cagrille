services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # ── Client HTTP ──────────────────────────────────────────────────────────
    Cagrille\AliExpressBundle\Api\AliExpressApiClient:
        arguments:
            $appKey:          '%ali_express.app_key%'
            $appSecret:       '%ali_express.app_secret%'
            $accessToken:     '%ali_express.access_token%'
            $baseUrl:         '%ali_express.base_url%'
            $timeout:         '%ali_express.timeout%'
            $targetCurrency:  '%ali_express.target_currency%'
            $targetLanguage:  '%ali_express.target_language%'

    Cagrille\AliExpressBundle\Contract\AliExpressApiClientInterface:
        alias: Cagrille\AliExpressBundle\Api\AliExpressApiClient

    # ── Endpoints ─────────────────────────────────────────────────────────────
    Cagrille\AliExpressBundle\Api\Endpoint\ProductEndpoint:
        arguments:
            $client: '@Cagrille\AliExpressBundle\Api\AliExpressApiClient'

    Cagrille\AliExpressBundle\Api\Endpoint\OrderEndpoint: ~
    Cagrille\AliExpressBundle\Api\Endpoint\LogisticsEndpoint: ~

    Cagrille\AliExpressBundle\Contract\ProductEndpointInterface:
        alias: Cagrille\AliExpressBundle\Api\Endpoint\ProductEndpoint

    Cagrille\AliExpressBundle\Contract\OrderEndpointInterface:
        alias: Cagrille\AliExpressBundle\Api\Endpoint\OrderEndpoint

    Cagrille\AliExpressBundle\Contract\LogisticsEndpointInterface:
        alias: Cagrille\AliExpressBundle\Api\Endpoint\LogisticsEndpoint

    # ── Persistance (Null Object par défaut → remplacé par SyliusProductPersistence) ──
    Cagrille\AliExpressBundle\Service\NullProductPersistence: ~

    Cagrille\AliExpressBundle\Contract\ProductPersistenceInterface:
        alias: Cagrille\AliExpressBundle\Service\NullProductPersistence

    # ── Services métier ────────────────────────────────────────────────────────
    Cagrille\AliExpressBundle\Service\ProductSyncService:
        arguments:
            $keywords:  '%ali_express.sync.keywords%'
            $batchSize: '%ali_express.sync.batch_size%'

    Cagrille\AliExpressBundle\Contract\ProductSyncServiceInterface:
        alias: Cagrille\AliExpressBundle\Service\ProductSyncService

    # ── Commandes CLI (autoconfigure = true les enregistre automatiquement) ───
    Cagrille\AliExpressBundle\Command\SyncProductsCommand: ~
    Cagrille\AliExpressBundle\Command\TrackOrderCommand: ~
