      <stop offset="0%"   stop-color="#e85d04"/>
      <stop offset="50%"  stop-color="#f48c06"/>
      <stop offset="100%" stop-color="#ffd166"/>
    </linearGradient>
    <!-- Flamme path -->
    <clipPath id="clip">
