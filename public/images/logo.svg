  </g>

  <!-- Texte CAGRILLE -->
  <text
    x="80"
    y="54"
    font-family="'Trebuchet MS', 'Arial Black', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    letter-spacing="6"
