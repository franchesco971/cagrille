services:
    php:
        image: ghcr.io/sylius/sylius-php:8.3-fixuid-xdebug-alpine
        user: ${DOCKER_USER:-1000:1000}
        depends_on:
            mysql:
                condition: service_healthy
        environment:
            APP_ENV: ${APP_ENV:-dev}
            APP_SECRET: ChangeMeForProduction
            DATABASE_URL: "mysql://root:cagrille@mysql/cagrille_%kernel.environment%"
            MAILER_DSN: smtp://mailhog:1025
            MESSENGER_TRANSPORT_DSN: doctrine://default
            SYLIUS_MESSENGER_TRANSPORT_MAIN_DSN: doctrine://default
            SYLIUS_MESSENGER_TRANSPORT_MAIN_FAILED_DSN: doctrine://default?queue_name=main_failed
            SYLIUS_MESSENGER_TRANSPORT_CATALOG_PROMOTION_REMOVAL_DSN: doctrine://default?queue_name=catalog_promotion_removal
            SYLIUS_MESSENGER_TRANSPORT_CATALOG_PROMOTION_REMOVAL_FAILED_DSN: doctrine://default?queue_name=catalog_promotion_removal_failed
            SYLIUS_MESSENGER_TRANSPORT_PAYMENT_REQUEST_DSN: sync://
            SYLIUS_MESSENGER_TRANSPORT_PAYMENT_REQUEST_FAILED_DSN: sync://
            PHP_DATE_TIMEZONE: ${PHP_DATE_TIMEZONE:-UTC}
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - .:/srv/sylius:rw,cached
            - ./public:/srv/sylius/public:rw,delegated
            - public-media:/srv/sylius/public/media:rw

    mysql:
        volumes:
            - mysql-data:/var/lib/mysql:rw
        ports:
            - "14306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: cagrille
        healthcheck:
            test: '/usr/bin/mysql -u root -pcagrille --execute "SHOW databases;"'
            timeout: 3s
            interval: 2s
            retries: 15

    nginx:
        depends_on:
            php:
                condition: service_started
        volumes:
            - ./public:/srv/sylius/public:ro
            - public-media:/srv/sylius/public/media:ro,nocopy
        ports:
            - "14080:80"

    nodejs:
        image: node:${NODE_VERSION:-22}-alpine
        user: ${DOCKER_USER:-1000:1000}
        working_dir: /srv/sylius
        entrypoint: [ "/bin/sh","-c" ]
        command:
            - |
                yarn install
                yarn build
        volumes:
            - .:/srv/sylius:rw,cached
            - ./public:/srv/sylius/public:rw,delegated

    adminer:
        image: adminer:4
        restart: unless-stopped
        ports:
            - "14081:8080"
        environment:
            ADMINER_DEFAULT_SERVER: mysql
            ADMINER_DESIGN: dracula
        depends_on:
            - mysql

    mailhog:
        ports:
            - "8025:8025"

volumes:
    mysql-data:
    public-media:
