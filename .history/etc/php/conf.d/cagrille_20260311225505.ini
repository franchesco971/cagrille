; Configuration PHP pour Cagrille (développement)
; Montée dans le conteneur via compose.override.yml

; Sylius peut faire des opérations longues (métadonnées API Platform, fixtures, migrations)
max_execution_time = 120
max_input_time = 120

; Mémoire suffisante pour Sylius + API Platform
memory_limit = 512M

; Upload d'images produits
upload_max_filesize = 32M
post_max_size = 32M

; Affichage des erreurs en dev
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
