name: Build Sylius Assets

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # - name: Install dependencies
      #   run: yarn install

      - name: Build assets
        run: npm run build

      - name: Upload assets as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sylius-assets
          path: public/build/